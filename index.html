<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   PlaceTrack v3 — Vanilla JS Application
   Firebase + localStorage offline fallback
   ═══════════════════════════════════════════════════════════ */

// ── Wait for Firebase module to load ──
const FB_READY = new Promise(res => {
  if (window.__FB) res();
  else window.addEventListener("firebase-loaded", res);
});

// ── Constants ──
const STATUSES = ["Applied","Shortlisted","Interview Scheduled","Interview Completed","Rejected","Offer Received"];
const SOURCES = ["LinkedIn","Naukri","Indeed","iimjobs","Wellfound","Company Website","Referral","Other"];
const STATUS_CLASS = {
  "Applied":"st-applied","Shortlisted":"st-shortlisted",
  "Interview Scheduled":"st-intscheduled","Interview Completed":"st-intcompleted",
  "Rejected":"st-rejected","Offer Received":"st-offer"
};
const STATUS_COLORS = {
  "Applied":"#64748b","Shortlisted":"#3b82f6","Interview Scheduled":"#8b5cf6",
  "Interview Completed":"#6366f1","Rejected":"#e11d48","Offer Received":"#059669"
};
const LS_KEY = "placetrack_v3_jobs";
const LS_THEME = "placetrack_v3_theme";

// ── Helpers ──
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const today = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const daysBetween = (d) => d ? Math.floor((new Date() - new Date(d)) / 864e5) : 999;
const fmtDate = (d) => { if(!d) return ""; return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short"}); };
const esc = (s) => { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; };

function blankJob() {
  return { id:uid(), company:"", role:"", dateApplied:today(), source:"LinkedIn",
    contactPerson:"", contactDetails:"", status:"Applied", lastUpdate:today(),
    followUpDate:"", notes:"", jobLink:"" };
}

// ── URL Parser ──
function parseJobURL(link) {
  let company="",role="",source="Other",confidence="low";
  try {
    const u=new URL(link.trim()), h=u.hostname.replace("www.","");
    if(h.includes("linkedin.com")){source="LinkedIn";const m=u.pathname.match(/\/jobs\/view\/(.+?)(?:\/|$)/);if(m){const s=m[1].replace(/-\d+$/,""),p=s.split("-at-");if(p.length>=2){role=p[0].split("-").map(w=>w[0]?.toUpperCase()+w.slice(1)).join(" ");company=p[1].split("-").map(w=>w[0]?.toUpperCase()+w.slice(1)).join(" ");confidence="high";}else{role=s.split("-").map(w=>w[0]?.toUpperCase()+w.slice(1)).join(" ");confidence="medium";}}}
    else if(h.includes("naukri.com")){source="Naukri";const m=u.pathname.match(/\/job-listings-(.+?)(?:\/|$)/);if(m){role=m[1].split("-").slice(0,4).map(w=>w[0]?.toUpperCase()+w.slice(1)).join(" ");confidence="medium";}}
    else if(h.includes("indeed.com")){source="Indeed";const q=u.searchParams.get("q");if(q){role=q;confidence="medium";}}
    else if(h.includes("iimjobs.com")){source="iimjobs";}
    else if(h.includes("wellfound.com")||h.includes("angel.co")){source="Wellfound";const m=u.pathname.match(/\/company\/([^/]+)/);if(m){company=m[1].split("-").map(w=>w[0]?.toUpperCase()+w.slice(1)).join(" ");confidence="medium";}}
    else{const dp=h.split("."),n=dp[dp.length-2];if(n&&!["com","org","net","co"].includes(n)){company=n[0].toUpperCase()+n.slice(1);source="Company Website";confidence="medium";}}
  }catch{}
  return {company,role,source,confidence};
}

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const state = {
  user: null,           // { uid, name, email, photo } or null
  mode: "loading",      // loading | auth | app
  syncMode: "local",    // local | firebase
  jobs: [],
  dark: localStorage.getItem(LS_THEME) !== "light",
  view: "table",        // table | analytics
  showForm: false,
  quickMode: true,
  editId: null,
  form: blankJob(),
  linkInput: "",
  parseConf: null,
  search: "",
  fStatus: "All",
  fSource: "All",
  sortKey: "dateApplied",
  sortDir: "desc",
  inlineEdit: null,     // {id,field,value}
  toast: null,
  confirmDel: null,
  showKB: false,
  unsub: null,          // firestore unsubscribe
};

// ── localStorage fallback ──
function lsLoad() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; } }
function lsSave(jobs) { try { localStorage.setItem(LS_KEY, JSON.stringify(jobs)); } catch {} }

// ═══════════════════════════════════════
//  FIREBASE DATA LAYER
// ═══════════════════════════════════════
function getJobsCol() {
  const FB = window.__FB;
  return FB.collection(FB.db, "users", state.user.uid, "applications");
}

function subscribeFirestore() {
  const FB = window.__FB;
  if (!FB.firebaseReady || !state.user) return;
  // Unsubscribe previous
  if (state.unsub) state.unsub();
  const col = getJobsCol();
  state.unsub = FB.onSnapshot(col, (snap) => {
    const jobs = [];
    snap.forEach(d => jobs.push({ id: d.id, ...d.data() }));
    state.jobs = jobs;
    lsSave(jobs); // keep localStorage in sync as backup
    render();
  }, (err) => {
    console.error("Firestore error:", err);
    flash("Sync error — using local data", "warn");
    state.jobs = lsLoad();
    render();
  });
  state.syncMode = "firebase";
}

async function fbSave(job) {
  const FB = window.__FB;
  if (!FB.firebaseReady || !state.user) { lsSave(state.jobs); return; }
  try {
    const ref = FB.doc(FB.db, "users", state.user.uid, "applications", job.id);
    const data = { ...job }; delete data.id;
    await FB.setDoc(ref, data);
  } catch (e) {
    console.error("Save error:", e); lsSave(state.jobs);
    flash("Save failed — stored locally", "warn");
  }
}

async function fbDelete(id) {
  const FB = window.__FB;
  if (!FB.firebaseReady || !state.user) { lsSave(state.jobs); return; }
  try {
    const ref = FB.doc(FB.db, "users", state.user.uid, "applications", id);
    await FB.deleteDoc(ref);
  } catch (e) {
    console.error("Delete error:", e); lsSave(state.jobs);
  }
}

async function fbClearAll() {
  const FB = window.__FB;
  if (!FB.firebaseReady || !state.user) { state.jobs = []; lsSave([]); return; }
  try {
    const batch = FB.writeBatch(FB.db);
    state.jobs.forEach(j => {
      const ref = FB.doc(FB.db, "users", state.user.uid, "applications", j.id);
      batch.delete(ref);
    });
    await batch.commit();
  } catch (e) { console.error("Clear error:", e); }
  state.jobs = []; lsSave([]);
}

// Sync local data UP to Firebase on first sign-in
async function syncLocalToFirebase() {
  const local = lsLoad();
  if (!local.length) return;
  const FB = window.__FB;
  if (!FB.firebaseReady || !state.user) return;
  const batch = FB.writeBatch(FB.db);
  local.forEach(j => {
    const ref = FB.doc(FB.db, "users", state.user.uid, "applications", j.id);
    const data = { ...j }; delete data.id;
    batch.set(ref, data);
  });
  try { await batch.commit(); flash("Local data synced to cloud"); } catch (e) { console.warn("Sync failed:", e); }
}

// ═══════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════
async function signInGoogle() {
  const FB = window.__FB;
  if (!FB.firebaseReady) { flash("Firebase not configured", "err"); return; }
  try {
    const result = await FB.signInWithPopup(FB.auth, FB.provider);
    const u = result.user;
    state.user = { uid: u.uid, name: u.displayName, email: u.email, photo: u.photoURL };
    state.mode = "app";
    await syncLocalToFirebase();
    subscribeFirestore();
    render();
  } catch (e) {
    console.error("Auth error:", e);
    flash("Sign-in failed: " + e.message, "err");
  }
}

async function signOutUser() {
  const FB = window.__FB;
  if (state.unsub) state.unsub();
  if (FB.firebaseReady) { try { await FB.signOut(FB.auth); } catch {} }
  state.user = null;
  state.syncMode = "local";
  state.jobs = lsLoad();
  state.mode = "auth";
  render();
}

function useLocalMode() {
  state.user = null;
  state.mode = "app";
  state.syncMode = "local";
  state.jobs = lsLoad();
  render();
}

// ── Init auth listener ──
async function initAuth() {
  await FB_READY;
  const FB = window.__FB;
  if (FB.firebaseReady) {
    FB.onAuthStateChanged(FB.auth, (u) => {
      if (u) {
        state.user = { uid: u.uid, name: u.displayName, email: u.email, photo: u.photoURL };
        state.mode = "app";
        subscribeFirestore();
      } else {
        state.mode = "auth";
        state.jobs = lsLoad();
      }
      render();
    });
  } else {
    // No Firebase config — go straight to local mode
    state.mode = "app";
    state.syncMode = "local";
    state.jobs = lsLoad();
    render();
  }
}

// ═══════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════
function flash(msg, type="ok") {
  state.toast = { msg, type };
  render();
  setTimeout(() => { state.toast = null; render(); }, 2800);
}

function openForm(job) {
  if (job) { state.form = { ...job }; state.editId = job.id; state.linkInput = job.jobLink || ""; state.quickMode = false; }
  else { state.form = blankJob(); state.editId = null; state.linkInput = ""; state.quickMode = true; }
  state.showForm = true; state.parseConf = null;
  render();
  setTimeout(() => { const el = $("#link-input"); if (el) el.focus(); }, 80);
}

function resetForm() {
  state.showForm = false; state.editId = null; state.form = blankJob();
  state.linkInput = ""; state.parseConf = null; render();
}

function handleAutofill() {
  const url = state.linkInput.trim();
  if (!url) return;
  if (state.jobs.some(j => j.jobLink === url && j.id !== state.editId)) { flash("Duplicate link!", "warn"); return; }
  const r = parseJobURL(url);
  state.form.company = r.company || state.form.company;
  state.form.role = r.role || state.form.role;
  state.form.source = r.source || state.form.source;
  state.form.jobLink = url;
  state.parseConf = r.confidence;
  render();
  setTimeout(() => { const el = $("#f-company"); if (el) el.focus(); }, 50);
}

function saveEntry() {
  if (!state.form.company.trim() || !state.form.role.trim()) { flash("Company & Role required", "err"); return; }
  state.form.lastUpdate = today();
  if (state.editId) {
    state.jobs = state.jobs.map(j => j.id === state.editId ? { ...state.form } : j);
    fbSave(state.form);
    flash("Updated");
  } else {
    state.jobs.unshift({ ...state.form });
    fbSave(state.form);
    flash("Added");
  }
  if (state.syncMode === "local") lsSave(state.jobs);
  resetForm();
}

function deleteEntry(id) {
  state.jobs = state.jobs.filter(j => j.id !== id);
  fbDelete(id);
  if (state.syncMode === "local") lsSave(state.jobs);
  state.confirmDel = null;
  flash("Deleted", "err");
  render();
}

function clearAll() {
  fbClearAll();
  state.jobs = [];
  if (state.syncMode === "local") lsSave([]);
  state.confirmDel = null;
  flash("All cleared", "err");
  render();
}

function quickStatus(id, st) {
  const job = state.jobs.find(j => j.id === id);
  if (!job) return;
  job.status = st; job.lastUpdate = today();
  fbSave(job);
  if (state.syncMode === "local") lsSave(state.jobs);
  render();
}

function commitInline() {
  const ie = state.inlineEdit;
  if (!ie) return;
  const job = state.jobs.find(j => j.id === ie.id);
  if (job) { job[ie.field] = ie.value; job.lastUpdate = today(); fbSave(job); }
  if (state.syncMode === "local") lsSave(state.jobs);
  state.inlineEdit = null;
  render();
}

function exportCSV() {
  const hdr=["Company","Role","Date Applied","Source","Status","Contact Person","Contact Details","Follow-up Date","Last Update","Notes","Job Link"];
  const rows=state.jobs.map(j=>[j.company,j.role,j.dateApplied,j.source,j.status,j.contactPerson,j.contactDetails,j.followUpDate,j.lastUpdate,j.notes,j.jobLink]);
  const csv=[hdr,...rows].map(r=>r.map(c=>`"${(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`placetrack_${today()}.csv`;a.click();
  flash("Exported CSV");
}

// ═══════════════════════════════════════
//  COMPUTED
// ═══════════════════════════════════════
function getFiltered() {
  let r = [...state.jobs];
  if (state.search) { const s=state.search.toLowerCase(); r=r.filter(j=>j.company?.toLowerCase().includes(s)||j.role?.toLowerCase().includes(s)||j.notes?.toLowerCase().includes(s)||j.contactPerson?.toLowerCase().includes(s)); }
  if (state.fStatus !== "All") r = r.filter(j=>j.status===state.fStatus);
  if (state.fSource !== "All") r = r.filter(j=>j.source===state.fSource);
  r.sort((a,b)=>{ const va=a[state.sortKey]||"",vb=b[state.sortKey]||""; return state.sortDir==="asc"?(va<vb?-1:1):(va>vb?-1:1); });
  return r;
}

function getStats() {
  const total=state.jobs.length, byS={};
  STATUSES.forEach(s=>byS[s]=state.jobs.filter(j=>j.status===s).length);
  const interviews=byS["Interview Scheduled"]+byS["Interview Completed"];
  const conv=total>0?((byS["Offer Received"]/total)*100).toFixed(1):"0.0";
  const bySrc={}; SOURCES.forEach(s=>{const c=state.jobs.filter(j=>j.source===s).length;if(c)bySrc[s]=c;});
  const weeks=[];
  for(let i=7;i>=0;i--){const e=new Date();e.setDate(e.getDate()-i*7);const s=new Date(e);s.setDate(s.getDate()-7);weeks.push({label:`W${8-i}`,count:state.jobs.filter(j=>{const d=new Date(j.dateApplied);return d>=s&&d<e;}).length});}
  return {total,byS,interviews,conv,bySrc,weeks};
}

    // Weekly trend
    html += `<div class="card analytics-card"><div class="analytics-title">Weekly Trend</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:110px">`;
    stats.weeks.forEach(w => {
      const h = Math.max(4,(w.count/maxWeek)*80);
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
        <span style="font-size:10px;font-weight:700;color:var(--accent)">${w.count||""}</span>
        <div style="width:100%;max-width:28px;border-radius:4px;height:${h}px;background:${w.count?'linear-gradient(180deg,var(--accent),#4338ca)':'var(--bg2)'};transition:height 0.5s ease"></div>
        <span style="font-size:9px;color:var(--dim);font-weight:600">${w.label}</span>
      </div>`;
    });
    html += `</div></div>`;

    // Source pie
    const srcData = Object.entries(stats.bySrc);
    const srcColors = ["#4f46e5","#3b82f6","#06b6d4","#10b981","#f59e0b","#ef4444","#ec4899","#8b5cf6"];
    html += `<div class="card analytics-card"><div class="analytics-title">Source Breakdown</div>`;
    if (srcData.length) {
      const srcTotal = srcData.reduce((s,[,v])=>s+v,0);
      let cum = 0;
      html += `<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><svg width="100" height="100" viewBox="-1 -1 2 2" style="transform:rotate(-90deg);flex-shrink:0">`;
      srcData.forEach(([l,v],i)=>{
        const a=(v/srcTotal)*Math.PI*2;const x1=Math.cos(cum),y1=Math.sin(cum);cum+=a;const x2=Math.cos(cum),y2=Math.sin(cum);
        html+=`<path d="M ${x1} ${y1} A 1 1 0 ${a>Math.PI?1:0} 1 ${x2} ${y2} L 0 0" fill="${srcColors[i%srcColors.length]}"/>`;
      });
      html+=`</svg><div style="display:flex;flex-direction:column;gap:4px">`;
      srcData.forEach(([l,v],i)=>{
        html+=`<div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style="width:8px;height:8px;border-radius:2px;background:${srcColors[i%srcColors.length]};flex-shrink:0"></span><span style="color:var(--text2);font-weight:600">${esc(l)}</span><span style="color:var(--dim)">${v}</span></div>`;
      });
      html+=`</div></div>`;
    } else { html+=`<p style="font-size:12px;color:var(--dim)">No data</p>`; }
    html += `</div>`;

    // Status bars
    html += `<div class="card analytics-card"><div class="analytics-title">Status Distribution</div>`;
    STATUSES.forEach(st=>{
      const pct=stats.total>0?(stats.byS[st]/stats.total*100):0;
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <span style="font-size:10px;font-weight:700;color:var(--muted);width:100px;flex-shrink:0;text-align:right">${st}</span>
        <div style="flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${STATUS_COLORS[st]};border-radius:4px;transition:width 0.5s ease"></div></div>
        <span style="font-size:11px;font-weight:800;color:${STATUS_COLORS[st]};width:22px;text-align:right">${stats.byS[st]}</span>
      </div>`;
    });
    html += `</div>`;

    // Recent activity
    html += `<div class="card analytics-card"><div class="analytics-title"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Recent Activity</div>`;
    if(!recent.length){html+=`<p style="font-size:12px;color:var(--dim)">No activity</p>`;}
    else{recent.forEach(j=>{html+=`<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px"><span style="width:5px;height:5px;border-radius:50%;background:${STATUS_COLORS[j.status]};flex-shrink:0"></span><span style="font-weight:700">${esc(j.company)}</span><span style="color:var(--dim)">·</span><span style="color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(j.role)}</span><span style="color:var(--ghost);font-size:10px;flex-shrink:0">${fmtDate(j.lastUpdate)}</span></div>`;});}
    html += `</div>`;

    // Upcoming follow-ups
    html += `<div class="card analytics-card"><div class="analytics-title"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Follow-ups</div>`;
    if(!todayFollows.length&&!upcomingFollows.length){html+=`<p style="font-size:12px;color:var(--dim)">None this week</p>`;}
    else{todayFollows.forEach(j=>{html+=`<div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:6px;background:var(--danger-soft);margin-bottom:4px"><span style="color:var(--danger);font-weight:800;font-size:9px;text-transform:uppercase">Today</span><span style="font-weight:700">${esc(j.company)}</span><span style="color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(j.role)}</span></div>`;});
    upcomingFollows.forEach(j=>{html+=`<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:4px"><span style="color:var(--accent);font-weight:800;font-size:10px;width:40px;flex-shrink:0">${fmtDate(j.followUpDate)}</span><span style="font-weight:700">${esc(j.company)}</span><span style="color:var(--muted);flex:1">${esc(j.role)}</span></div>`;});}
    html += `</div>`;

    html += `</div>`; // analytics-grid
  } else {
    // ═══ TABLE VIEW ═══

    // ── Form ──
    if (state.showForm) {
      html += `<div class="form-panel slide-up" id="form-panel">
        <div class="form-topbar">
          <div style="flex:1;display:flex;align-items:center;gap:6px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:7px;padding:0 10px">
            <svg width="13" height="13" fill="none" stroke="var(--dim)" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            <input id="link-input" value="${esc(state.linkInput)}" placeholder="Paste job URL and press Enter..." style="background:transparent;border:none;outline:none;color:var(--text);font-size:12px;padding:7px 0;width:100%;font-family:var(--font)">
          </div>
          <button class="btn btn-primary" style="flex-shrink:0;font-size:11px" onclick="handleAutofill()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Fill
          </button>
          <button class="btn btn-ghost" style="font-size:10px;flex-shrink:0" onclick="state.quickMode=!state.quickMode;render()">
            ${state.quickMode?"▸ More":"▾ Less"}
          </button>
          <button class="btn btn-icon" onclick="resetForm()" title="Close"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        ${state.parseConf?`<div style="padding:4px 14px;font-size:10px;font-weight:600;color:${state.parseConf==="high"?"var(--success)":state.parseConf==="medium"?"var(--warn)":"var(--danger)"};display:flex;align-items:center;gap:4px"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${state.parseConf} confidence — verify below</div>`:""}
        ${isDup?`<div style="padding:4px 14px;font-size:10px;font-weight:700;color:var(--warn);display:flex;align-items:center;gap:4px">⚠ Duplicate: same company + role exists</div>`:""}
        <div class="form-grid ${state.quickMode?"quick":"full"}">
          <div><label class="label">Company *</label><input class="input" id="f-company" value="${esc(state.form.company)}" placeholder="e.g. HSBC"></div>
          <div><label class="label">Role *</label><input class="input" id="f-role" value="${esc(state.form.role)}" placeholder="e.g. Financial Analyst"></div>
          <div><label class="label">Status</label><select class="input" id="f-status">${STATUSES.map(s=>`<option value="${s}"${s===state.form.status?" selected":""}>${s}</option>`).join("")}</select></div>
          ${state.quickMode?`<div style="display:flex;gap:6px;padding-bottom:1px"><button class="btn btn-primary" onclick="readFormAndSave()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${state.editId?"Update":"Save"}</button><button class="btn btn-ghost" onclick="resetForm()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`:""}
          ${!state.quickMode?`
            <div><label class="label">Date Applied</label><input class="input" type="date" id="f-date" value="${state.form.dateApplied}"></div>
            <div><label class="label">Source</label><select class="input" id="f-source">${SOURCES.map(s=>`<option value="${s}"${s===state.form.source?" selected":""}>${s}</option>`).join("")}</select></div>
            <div><label class="label">Contact Person</label><input class="input" id="f-contact" value="${esc(state.form.contactPerson)}" placeholder="Name"></div>
            <div><label class="label">Contact Details</label><input class="input" id="f-contactd" value="${esc(state.form.contactDetails)}" placeholder="Email / Phone"></div>
            <div><label class="label">Follow-up Date</label><input class="input" type="date" id="f-followup" value="${state.form.followUpDate}"></div>
            <div style="grid-column:1/-1"><label class="label">Notes</label><textarea class="input" id="f-notes" style="min-height:40px" placeholder="Notes...">${esc(state.form.notes)}</textarea></div>
            <div style="grid-column:1/-1;display:flex;gap:6px;padding-top:2px">
              <button class="btn btn-primary" onclick="readFormAndSave()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${state.editId?"Update":"Save"}</button>
              <button class="btn btn-ghost" onclick="resetForm()">Cancel</button>
              <span style="font-size:10px;color:var(--dim);margin-left:auto;align-self:center">⌘ Enter to save</span>
            </div>
          `:""}
        </div>
      </div>`;
    }

    // ── Table ──
    html += `<div class="card" style="overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" style="font-size:11px" onclick="openForm()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New</button>
        <div style="width:1px;height:18px;background:var(--border)"></div>
        <select class="input" style="width:auto;padding:5px 8px;font-size:11px" id="filter-status">${["All",...STATUSES].map(s=>`<option value="${s}"${s===state.fStatus?" selected":""}>${s==="All"?"All Status":s}</option>`).join("")}</select>
        <select class="input" style="width:auto;padding:5px 8px;font-size:11px" id="filter-source">${["All",...SOURCES].map(s=>`<option value="${s}"${s===state.fSource?" selected":""}>${s==="All"?"All Sources":s}</option>`).join("")}</select>
        <span style="margin-left:auto;font-size:11px;color:var(--dim);font-weight:500">${filtered.length} of ${state.jobs.length}</span>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>
            <th style="width:24px"></th>
            <th data-sort="company">Company ${state.sortKey==="company"?(state.sortDir==="asc"?"↑":"↓"):""}</th>
            <th data-sort="role">Role ${state.sortKey==="role"?(state.sortDir==="asc"?"↑":"↓"):""}</th>
            <th data-sort="dateApplied" style="width:75px">Applied ${state.sortKey==="dateApplied"?(state.sortDir==="asc"?"↑":"↓"):""}</th>
            <th class="hide-mobile" style="width:75px">Source</th>
            <th data-sort="status" style="width:150px">Status ${state.sortKey==="status"?(state.sortDir==="asc"?"↑":"↓"):""}</th>
            <th class="hide-mobile" style="width:75px">Follow-up</th>
            <th style="width:85px"></th>
          </tr></thead>
          <tbody>`;

    if (!filtered.length) {
      html += `<tr><td colspan="8" class="empty-state">
        ${state.jobs.length===0?`<div class="empty-icon">+</div><div>No applications yet</div><button class="btn btn-primary" style="margin-top:10px;font-size:12px" onclick="openForm()">Add your first</button>`:"No results match your filters"}
      </td></tr>`;
    } else {
      filtered.forEach(j => {
        const stale = daysBetween(j.lastUpdate)>=7 && !["Rejected","Offer Received"].includes(j.status);
        const follow = j.followUpDate && new Date(j.followUpDate)<=new Date() && !["Rejected","Offer Received"].includes(j.status);
        const cls = follow ? "row-follow" : stale ? "row-stale" : "";
        const ie = state.inlineEdit;

        html += `<tr class="${cls}">
          <td style="padding-left:10px">
            ${follow?'<svg width="12" height="12" fill="none" stroke="var(--danger)" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>':''}
            ${!follow&&stale?'<svg width="12" height="12" fill="none" stroke="var(--warn)" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>':''}
          </td>
          <td data-inline="${j.id}:company" style="cursor:text">
            ${ie&&ie.id===j.id&&ie.field==="company"?`<input class="inline-input" data-commit value="${esc(ie.value)}">`:`<div style="font-weight:700">${esc(j.company)}</div>${j.contactPerson?`<div style="font-size:10px;color:var(--dim)">${esc(j.contactPerson)}</div>`:""}`}
          </td>
          <td data-inline="${j.id}:role" style="cursor:text">
            ${ie&&ie.id===j.id&&ie.field==="role"?`<input class="inline-input" data-commit value="${esc(ie.value)}">`:`<div style="font-weight:600">${esc(j.role)}</div>${j.notes?`<div style="font-size:10px;color:var(--dim);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(j.notes)}</div>`:""}`}
          </td>
          <td style="font-size:11px;color:var(--muted);white-space:nowrap">${fmtDate(j.dateApplied)}</td>
          <td class="hide-mobile" style="font-size:11px;color:var(--muted)">${esc(j.source)}</td>
          <td>
            <div class="status-wrap">
              <select data-quickstatus="${j.id}">${STATUSES.map(s=>`<option value="${s}"${s===j.status?" selected":""}>${s}</option>`).join("")}</select>
              <span class="badge ${STATUS_CLASS[j.status]}" data-status="${j.status}"><span class="dot"></span>${j.status}</span>
            </div>
          </td>
          <td class="hide-mobile" style="font-size:11px;white-space:nowrap;${follow?"color:var(--danger);font-weight:700":"color:var(--muted)"}">${j.followUpDate?fmtDate(j.followUpDate):'<span style="color:var(--ghost)">—</span>'}</td>
          <td>
            <div style="display:flex;gap:3px">
              <button class="btn btn-icon" data-edit="${j.id}" title="Edit"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
              ${j.jobLink?`<a href="${esc(j.jobLink)}" target="_blank" rel="noreferrer" class="btn btn-icon" title="Open link"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></a>`:""}
              <button class="btn btn-icon" data-del="${j.id}" title="Delete" style="color:var(--danger)"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
            </div>
          </td>
        </tr>`;
      });
    }
    html += `</tbody></table></div></div>`;

    // ── Bottom Widgets ──
    if (state.jobs.length) {
      html += `<div class="widgets-grid">
        <div class="card widget-card"><div class="widget-title"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Recent Activity</div>`;
      recent.forEach(j=>{html+=`<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px"><span style="width:5px;height:5px;border-radius:50%;background:${STATUS_COLORS[j.status]};flex-shrink:0"></span><span style="font-weight:700">${esc(j.company)}</span><span style="color:var(--dim)">·</span><span style="color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(j.role)}</span><span class="badge ${STATUS_CLASS[j.status]}" data-status="${j.status}" style="font-size:9px;padding:2px 6px"><span class="dot" style="width:4px;height:4px"></span>${j.status}</span></div>`;});
      html += `</div>`;
      html += `<div class="card widget-card"><div class="widget-title"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Follow-ups</div>`;
      if(!todayFollows.length&&!upcomingFollows.length){html+=`<p style="font-size:11px;color:var(--dim)">None scheduled</p>`;}
      else{todayFollows.forEach(j=>{html+=`<div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:6px;background:var(--danger-soft);margin-bottom:4px;cursor:pointer" data-edit="${j.id}"><span style="color:var(--danger);font-weight:800;font-size:9px">TODAY</span><span style="font-weight:700">${esc(j.company)}</span><span style="color:var(--muted);flex:1">${esc(j.role)}</span></div>`;});
      upcomingFollows.forEach(j=>{html+=`<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:4px;cursor:pointer" data-edit="${j.id}"><span style="color:var(--accent);font-weight:800;font-size:10px;width:40px;flex-shrink:0">${fmtDate(j.followUpDate)}</span><span style="font-weight:700">${esc(j.company)}</span><span style="color:var(--muted);flex:1">${esc(j.role)}</span></div>`;});}
      html += `</div></div>`;
    }
  }

  html += `</main>`;

  // ── Toast ──
  if (state.toast) {
    html += `<div class="toast toast-${state.toast.type}">${esc(state.toast.msg)}</div>`;
  }

  // ── Modal ──
  if (state.confirmDel) {
    const isAll = state.confirmDel === "all";
    const job = !isAll ? state.jobs.find(j=>j.id===state.confirmDel) : null;
    html += `<div class="modal-overlay" onclick="state.confirmDel=null;render()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="font-size:16px;font-weight:800;margin-bottom:6px">${isAll?"Clear All Data?":"Delete Application?"}</h3>
        <p style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:18px">${isAll?`Permanently remove all ${state.jobs.length} applications.`:`Delete "${esc(job?.company||"")} — ${esc(job?.role||"")}"?`}</p>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-ghost" onclick="state.confirmDel=null;render()">Cancel</button>
          <button class="btn btn-danger" onclick="${isAll?'clearAll()':'deleteEntry(\"'+state.confirmDel+'\")'}">${isAll?"Delete All":"Delete"}</button>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML = html;

  // ── Bind events post-render ──
  bindEvents();
}

// ═══════════════════════════════════════
//  EVENT BINDING
// ═══════════════════════════════════════
function bindEvents() {
  // Search
  const si = $("#search-input");
  if (si) si.oninput = (e) => { state.search = e.target.value; render(); };

  // Filters
  const fs = $("#filter-status");
  if (fs) fs.onchange = (e) => { state.fStatus = e.target.value; render(); };
  const fsr = $("#filter-source");
  if (fsr) fsr.onchange = (e) => { state.fSource = e.target.value; render(); };

  // Sort headers
  $$("th[data-sort]").forEach(th => {
    th.onclick = () => {
      const k = th.dataset.sort;
      if (state.sortKey===k) state.sortDir = state.sortDir==="asc"?"desc":"asc";
      else { state.sortKey=k; state.sortDir="desc"; }
      render();
    };
  });

  // Quick status
  $$("select[data-quickstatus]").forEach(sel => {
    sel.onchange = (e) => quickStatus(sel.dataset.quickstatus, e.target.value);
  });

  // Edit buttons
  $$("[data-edit]").forEach(el => {
    if (el.tagName === "BUTTON" || el.dataset.edit) {
      el.onclick = (e) => {
        e.stopPropagation();
        const job = state.jobs.find(j=>j.id===el.dataset.edit);
        if (job) openForm(job);
      };
    }
  });

  // Delete buttons
  $$("[data-del]").forEach(el => {
    el.onclick = (e) => { e.stopPropagation(); state.confirmDel = el.dataset.del; render(); };
  });

  // Inline edit — click to start
  $$("td[data-inline]").forEach(td => {
    td.onclick = () => {
      const [id, field] = td.dataset.inline.split(":");
      const job = state.jobs.find(j=>j.id===id);
      if (job && !(state.inlineEdit?.id===id && state.inlineEdit?.field===field)) {
        state.inlineEdit = { id, field, value: job[field] };
        render();
        setTimeout(() => { const inp = td.querySelector("input"); if(inp){inp.focus();inp.select();} }, 20);
      }
    };
  });

  // Inline edit — commit
  $$("input[data-commit]").forEach(inp => {
    inp.oninput = (e) => { if(state.inlineEdit) state.inlineEdit.value = e.target.value; };
    inp.onblur = () => commitInline();
    inp.onkeydown = (e) => { if(e.key==="Enter")commitInline(); if(e.key==="Escape"){state.inlineEdit=null;render();} };
  });

  // Form fields
  const linkInp = $("#link-input");
  if (linkInp) {
    linkInp.oninput = (e) => { state.linkInput = e.target.value; };
    linkInp.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); handleAutofill(); } };
  }

  // Form field sync
  ["f-company","f-role","f-status","f-date","f-source","f-contact","f-contactd","f-followup","f-notes"].forEach(id => {
    const el = $(`#${id}`);
    if (!el) return;
    const map = {"f-company":"company","f-role":"role","f-status":"status","f-date":"dateApplied","f-source":"source","f-contact":"contactPerson","f-contactd":"contactDetails","f-followup":"followUpDate","f-notes":"notes"};
    el.oninput = el.onchange = (e) => { state.form[map[id]] = e.target.value; };
  });

  // Quick mode: Enter on company → focus role, Enter on role → save
  const fc = $("#f-company");
  if (fc) fc.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); const r = $("#f-role"); if(r)r.focus(); } };
  const fr = $("#f-role");
  if (fr) fr.onkeydown = (e) => { if (e.key === "Enter" && state.quickMode) { e.preventDefault(); readFormAndSave(); } };
}

// Read form DOM values and save (ensures latest values)
function readFormAndSave() {
  const get = (id) => { const el = $(`#${id}`); return el ? el.value : ""; };
  state.form.company = get("f-company");
  state.form.role = get("f-role");
  state.form.status = get("f-status");
  if (!state.quickMode) {
    state.form.dateApplied = get("f-date");
    state.form.source = get("f-source");
    state.form.contactPerson = get("f-contact");
    state.form.contactDetails = get("f-contactd");
    state.form.followUpDate = get("f-followup");
    state.form.notes = get("f-notes");
  }
  saveEntry();
}
// Expose to global
window.readFormAndSave = readFormAndSave;

// ── Keyboard shortcuts ──
document.addEventListener("keydown", (e) => {
  if ((e.metaKey||e.ctrlKey) && e.key === "k") { e.preventDefault(); const s=$("#search-input"); if(s)s.focus(); }
  if ((e.metaKey||e.ctrlKey) && e.key === "n") { e.preventDefault(); openForm(); }
  if ((e.metaKey||e.ctrlKey) && e.key === "Enter" && state.showForm) { e.preventDefault(); readFormAndSave(); }
  if (e.key === "Escape") {
    if (state.confirmDel) { state.confirmDel = null; render(); }
    else if (state.showForm) resetForm();
    else if (state.inlineEdit) { state.inlineEdit = null; render(); }
  }
});

// Expose globals for onclick handlers
window.signInGoogle = signInGoogle;
window.signOutUser = signOutUser;
window.useLocalMode = useLocalMode;
window.openForm = openForm;
window.resetForm = resetForm;
window.handleAutofill = handleAutofill;
window.saveEntry = saveEntry;
window.deleteEntry = deleteEntry;
window.clearAll = clearAll;
window.quickStatus = quickStatus;
window.commitInline = commitInline;
window.exportCSV = exportCSV;
window.flash = flash;
window.state = state;
window.render = render;

// ── Init ──
initAuth();

</script>
