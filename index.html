<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PlaceTrack — Job Application Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--font:'Outfit',system-ui,-apple-system,sans-serif;--bg:#0b0c10;--bg2:#111318;--card:#15171e;--border:#232736;--border-lt:#1c1f29;--ghost:#2e3347;--text:#f0f2f8;--text2:#c5cadb;--muted:#777d96;--dim:#4d5268;--accent:#6c7bff;--accent-soft:rgba(108,123,255,0.08);--accent-mid:rgba(108,123,255,0.2);--input-bg:#191c25;--input-border:#282d3e;--input-focus:#6c7bff;--danger:#f87171;--danger-soft:rgba(248,113,113,0.08);--success:#34d399;--warn:#fbbf24;--row-hover:#1a1d28;--shadow:0 1px 3px rgba(0,0,0,0.3);--shadow-lg:0 8px 24px rgba(0,0,0,0.4);--header-bg:rgba(11,12,16,0.88);--radius:8px;--radius-lg:12px}
[data-theme="light"]{--bg:#f5f6fa;--bg2:#eceef5;--card:#fff;--border:#e0e3ed;--border-lt:#edf0f7;--ghost:#cdd1de;--text:#111827;--text2:#374151;--muted:#6b7280;--dim:#9ca3af;--accent:#4f46e5;--accent-soft:rgba(79,70,229,0.06);--accent-mid:rgba(79,70,229,0.15);--input-bg:#f8f9fc;--input-border:#d1d5e0;--input-focus:#4f46e5;--danger:#dc2626;--danger-soft:rgba(220,38,38,0.06);--success:#059669;--warn:#d97706;--row-hover:#f4f6fb;--shadow:0 1px 3px rgba(0,0,0,0.05);--shadow-lg:0 8px 24px rgba(0,0,0,0.08);--header-bg:rgba(255,255,255,0.86)}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent-mid)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--ghost);border-radius:3px}
input,select,textarea,button{font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--input-focus)!important;box-shadow:0 0 0 2px rgba(108,123,255,0.15)!important;outline:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1}}
.fade-up{animation:fadeUp .3s ease both}.slide-up{animation:slideUp .25s ease both}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;transition:all .15s;border:none;line-height:1;font-family:var(--font)}
.btn:hover{filter:brightness(1.1)}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;padding:8px 14px;box-shadow:0 1px 4px rgba(108,123,255,0.25)}
.btn-ghost{background:transparent;color:var(--muted);padding:7px 10px;border:1px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff;padding:7px 12px}
.btn-icon{background:transparent;color:var(--muted);padding:6px;border-radius:6px;border:none}
.btn-icon:hover{background:var(--accent-soft);color:var(--accent)}
.input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
.label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:block}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:650;white-space:nowrap}
.badge .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.st-applied{--sc:#64748b;--sd:#94a3b8}.st-shortlisted{--sc:#3b82f6;--sd:#60a5fa}.st-intscheduled{--sc:#8b5cf6;--sd:#a78bfa}.st-intcompleted{--sc:#6366f1;--sd:#818cf8}.st-rejected{--sc:#e11d48;--sd:#fb7185}.st-offer{--sc:#059669;--sd:#34d399}
[data-status]{background:color-mix(in srgb,var(--sc) 10%,transparent);color:var(--sd);border:1px solid color-mix(in srgb,var(--sc) 25%,transparent)}
[data-status] .dot{background:var(--sd)}
.header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px) saturate(1.4)}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{text-align:center;padding:40px 36px;max-width:380px;width:100%}
.auth-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:22px;margin:0 auto 16px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border-radius:10px;background:#fff;color:#333;border:1px solid #ddd;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:20px}
.google-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.local-btn{display:block;margin:12px auto 0;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline}
.user-pill{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;border-radius:20px;background:var(--accent-soft);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text2)}
.user-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;overflow:hidden}
.user-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px}
.sync-dot.online{background:var(--success);animation:dotPulse 2s infinite}.sync-dot.local{background:var(--dim)}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table thead th{position:sticky;top:50px;background:var(--card);padding:8px 10px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;z-index:10}
.data-table thead th:hover{color:var(--accent)}
.data-table tbody tr{transition:background .15s}.data-table tbody tr:hover{background:var(--row-hover)}
.data-table tbody td{padding:10px;border-bottom:1px solid var(--border-lt);vertical-align:middle}
.row-stale{background:rgba(251,191,36,0.04)!important}.row-follow{background:rgba(248,113,113,0.04)!important}
.inline-input{background:var(--input-bg);border:1px solid var(--input-focus);border-radius:5px;padding:3px 6px;font-size:12px;color:var(--text);font-weight:600;outline:none;width:100%;font-family:var(--font)}
.status-wrap{position:relative;display:inline-block}.status-wrap select{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow)}
.stat-val{font-size:24px;font-weight:900;letter-spacing:-.04em;line-height:1}
.stat-label{font-size:10px;color:var(--dim);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
.analytics-card{padding:18px}
.analytics-title{font-size:11px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.form-panel{border:1px solid rgba(108,123,255,0.3);border-radius:var(--radius-lg);margin-bottom:12px;box-shadow:0 0 0 1px rgba(108,123,255,0.1),var(--shadow);overflow:hidden;background:var(--card)}
.form-topbar{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;gap:6px;align-items:center}
.form-grid{padding:12px 14px;display:grid;gap:10px;align-items:end}
.form-grid.quick{grid-template-columns:1fr 1fr 130px auto}
.form-grid.full{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
.alert-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.alert-pill{display:flex;align-items:center;gap:6px;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600}
.alert-danger{background:var(--danger-soft);border:1px solid rgba(248,113,113,0.2);color:var(--danger)}
.alert-warn{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);color:var(--warn)}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:9px;font-size:12px;font-weight:700;color:#fff;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,0.25);animation:slideUp .25s ease}
.toast-ok{background:#059669}.toast-err{background:#dc2626}.toast-warn{background:#d97706}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.modal-box{background:var(--card);border-radius:14px;padding:24px 28px;max-width:400px;width:90%;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}
.spinner{width:24px;height:24px;border:2.5px solid var(--ghost);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.empty-state{text-align:center;padding:48px 20px;color:var(--dim)}
.empty-icon{width:48px;height:48px;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:20px;margin:0 auto 10px}
.widgets-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:12px}
.widget-card{padding:16px}
.widget-title{font-size:11px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
@media(max-width:768px){.form-grid.quick{grid-template-columns:1fr 1fr}.form-grid.full{grid-template-columns:1fr 1fr}.header{padding:0 10px}.stats-grid{grid-template-columns:repeat(3,1fr)}.analytics-grid{grid-template-columns:1fr}.data-table{font-size:11px}.data-table thead th,.data-table tbody td{padding:8px 6px}.hide-mobile{display:none!important}}
@media(max-width:480px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-grid.quick{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0b0c10"><div class="spinner"></div></div></div>
<script>
// ==========================
// PlaceTrack v3.1 — Fixed
// ==========================
console.log("PlaceTrack loading...");

// ---- FIREBASE CONFIG ----
const firebaseConfig = {
  apiKey: "AIzaSyDlOCOerJrKoC02gHiJuyT97t9lgbKBekU",
  authDomain: "job-dashboard-6d186.firebaseapp.com",
  projectId: "job-dashboard-6d186",
  storageBucket: "job-dashboard-6d186.firebasestorage.app",
  messagingSenderId: "466257737075",
  appId: "1:466257737075:web:affa477a08a702b301c106",
  measurementId: "G-0CX7MM2CR2"
};

var firebaseReady = false;
var fbAuth = null;
var fbDb = null;
var fbProvider = null;
  
// ---- Firebase Init (FINAL FIXED VERSION) ----
var firebaseReady = false;
var fbAuth = null;
var fbDb = null;
var fbProvider = null;

try {
  if (typeof firebase !== "undefined" && firebaseConfig.apiKey) {

    firebase.initializeApp(firebaseConfig);

    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
    fbProvider = new firebase.auth.GoogleAuthProvider();

    // 🔥 CRITICAL: Keep user logged in
    fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
      .then(function () {
        console.log("Auth persistence set to LOCAL");
      })
      .catch(function (error) {
        console.error("Auth persistence error:", error);
      });

    // 🔥 SAFE Firestore persistence (won’t break app)
    try {
      fbDb.enablePersistence({ synchronizeTabs: true })
        .catch(function (err) {
          console.warn("Firestore persistence failed:", err.code);
        });
    } catch (e) {
      console.warn("Persistence not supported");
    }

    firebaseReady = true;
    console.log("Firebase OK");

  } else {
    console.log("No Firebase config - local mode");
  }

} catch (e) {
  console.warn("Firebase init error:", e);
}

// ---- Constants ----
var STATUSES=["Applied","Shortlisted","Interview Scheduled","Interview Completed","Rejected","Offer Received"];
var SOURCES=["LinkedIn","Naukri","Indeed","iimjobs","Wellfound","Company Website","Referral","Other"];
var SC_CLASS={"Applied":"st-applied","Shortlisted":"st-shortlisted","Interview Scheduled":"st-intscheduled","Interview Completed":"st-intcompleted","Rejected":"st-rejected","Offer Received":"st-offer"};
var SC_COLOR={"Applied":"#64748b","Shortlisted":"#3b82f6","Interview Scheduled":"#8b5cf6","Interview Completed":"#6366f1","Rejected":"#e11d48","Offer Received":"#059669"};
var LS_KEY="placetrack_v3_jobs",LS_THEME="placetrack_v3_theme";

// ---- Helpers ----
function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function today(){return new Date().toISOString().slice(0,10)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function daysBetween(d){return d?Math.floor((new Date()-new Date(d))/864e5):999}
function fmtDate(d){if(!d)return"";return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short"})}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function blankJob(){return{id:uid(),company:"",role:"",dateApplied:today(),source:"LinkedIn",contactPerson:"",contactDetails:"",status:"Applied",lastUpdate:today(),followUpDate:"",notes:"",jobLink:""}}

// ---- URL Parser ----
function parseJobURL(link){
  var company="",role="",source="Other",confidence="low";
  try{
    var u=new URL(link.trim()),h=u.hostname.replace("www.","");
    if(h.indexOf("linkedin.com")>=0){source="LinkedIn";var m=u.pathname.match(/\/jobs\/view\/(.+?)(?:\/|$)/);if(m){var s=m[1].replace(/-\d+$/,""),p=s.split("-at-");if(p.length>=2){role=p[0].split("-").map(function(w){return w[0]?w[0].toUpperCase()+w.slice(1):w}).join(" ");company=p[1].split("-").map(function(w){return w[0]?w[0].toUpperCase()+w.slice(1):w}).join(" ");confidence="high";}else{role=s.split("-").map(function(w){return w[0]?w[0].toUpperCase()+w.slice(1):w}).join(" ");confidence="medium";}}}
    else if(h.indexOf("naukri.com")>=0){source="Naukri";var m2=u.pathname.match(/\/job-listings-(.+?)(?:\/|$)/);if(m2){role=m2[1].split("-").slice(0,4).map(function(w){return w[0]?w[0].toUpperCase()+w.slice(1):w}).join(" ");confidence="medium";}}
    else if(h.indexOf("indeed.com")>=0){source="Indeed";var q=u.searchParams.get("q");if(q){role=q;confidence="medium";}}
    else if(h.indexOf("iimjobs.com")>=0){source="iimjobs"}
    else if(h.indexOf("wellfound.com")>=0||h.indexOf("angel.co")>=0){source="Wellfound";var m3=u.pathname.match(/\/company\/([^/]+)/);if(m3){company=m3[1].split("-").map(function(w){return w[0]?w[0].toUpperCase()+w.slice(1):w}).join(" ");confidence="medium";}}
    else{var dp=h.split("."),n=dp[dp.length-2];if(n&&["com","org","net","co","gov","edu"].indexOf(n)<0){company=n[0].toUpperCase()+n.slice(1);source="Company Website";confidence="medium";}}
  }catch(e){}
  return{company:company,role:role,source:source,confidence:confidence}
}

// ---- localStorage ----
function lsLoad(){try{return JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){return[]}}
function lsSave(j){try{localStorage.setItem(LS_KEY,JSON.stringify(j))}catch(e){}}

// ---- STATE ----
var S={user:null,mode:"loading",syncMode:"local",jobs:[],dark:localStorage.getItem(LS_THEME)!=="light",view:"table",showForm:false,quickMode:true,editId:null,form:blankJob(),linkInput:"",parseConf:null,search:"",fStatus:"All",fSource:"All",sortKey:"dateApplied",sortDir:"desc",inlineEdit:null,toast:null,confirmDel:null,showKB:false,unsub:null};

// ---- Firebase Data ----
function getRef(){return fbDb.collection("users").doc(S.user.uid).collection("applications")}
function subscribeFB(){
  if(!firebaseReady||!S.user)return;
  if(S.unsub)S.unsub();
  S.unsub=getRef().onSnapshot(function(snap){var j=[];snap.forEach(function(d){j.push(Object.assign({id:d.id},d.data()))});S.jobs=j;lsSave(j);render()},function(err){console.error("FB err:",err);flash("Sync error","warn");S.jobs=lsLoad();render()});
  S.syncMode="firebase"
}
function fbSave(job){if(!firebaseReady||!S.user){lsSave(S.jobs);return}var d=Object.assign({},job);var id=d.id;delete d.id;getRef().doc(id).set(d).catch(function(e){console.error(e);lsSave(S.jobs);flash("Save failed - stored locally","warn")})}
function fbDel(id){if(!firebaseReady||!S.user){lsSave(S.jobs);return}getRef().doc(id).delete().catch(function(e){console.error(e);lsSave(S.jobs)})}
function fbClear(){if(!firebaseReady||!S.user){S.jobs=[];lsSave([]);return}var b=fbDb.batch();S.jobs.forEach(function(j){b.delete(getRef().doc(j.id))});b.commit().catch(function(e){console.error(e)});S.jobs=[];lsSave([])}
function syncUp(){var local=lsLoad();if(!local.length||!firebaseReady||!S.user)return;var b=fbDb.batch();local.forEach(function(j){var d=Object.assign({},j);var id=d.id;delete d.id;b.set(getRef().doc(id),d)});b.commit().then(function(){flash("Local data synced to cloud")}).catch(function(e){console.warn(e)})}

// ---- Auth ----
function signInGoogle(){
  if(!firebaseReady){flash("Firebase not configured","err");return}
  fbAuth.signInWithPopup(fbProvider).then(function(r){var u=r.user;S.user={uid:u.uid,name:u.displayName,email:u.email,photo:u.photoURL};S.mode="app";syncUp();subscribeFB();render()}).catch(function(e){console.error(e);flash("Sign-in failed: "+e.message,"err")})
}
function signOutUser(){if(S.unsub)S.unsub();if(firebaseReady)fbAuth.signOut().catch(function(){});S.user=null;S.syncMode="local";S.jobs=lsLoad();S.mode="auth";render()}
function useLocalMode(){S.user=null;S.mode="app";S.syncMode="local";S.jobs=lsLoad();render()}

function initApp(){
  console.log("initApp, firebaseReady="+firebaseReady);
  if(firebaseReady){
    fbAuth.onAuthStateChanged(function(u){
      if(u){S.user={uid:u.uid,name:u.displayName,email:u.email,photo:u.photoURL};S.mode="app";subscribeFB()}
      else{S.mode="auth";S.jobs=lsLoad()}
      render()
    })
  }else{S.mode="app";S.syncMode="local";S.jobs=lsLoad();render()}
}

// ---- Actions ----
function flash(msg,type){type=type||"ok";S.toast={msg:msg,type:type};render();setTimeout(function(){S.toast=null;render()},2800)}
function openForm(job){
  if(job){S.form=Object.assign({},job);S.editId=job.id;S.linkInput=job.jobLink||"";S.quickMode=false}
  else{S.form=blankJob();S.editId=null;S.linkInput="";S.quickMode=true}
  S.showForm=true;S.parseConf=null;render();setTimeout(function(){var el=$("#link-input");if(el)el.focus()},80)
}
function resetForm(){S.showForm=false;S.editId=null;S.form=blankJob();S.linkInput="";S.parseConf=null;render()}
function handleAutofill(){
  var url=S.linkInput.trim();if(!url)return;
  if(S.jobs.some(function(j){return j.jobLink===url&&j.id!==S.editId})){flash("Duplicate link!","warn");return}
  var r=parseJobURL(url);S.form.company=r.company||S.form.company;S.form.role=r.role||S.form.role;S.form.source=r.source||S.form.source;S.form.jobLink=url;S.parseConf=r.confidence;
  render();setTimeout(function(){var el=$("#f-company");if(el)el.focus()},50)
}
function readFormAndSave(){
  var g=function(id){var el=$("#"+id);return el?el.value:""};
  S.form.company=g("f-company");S.form.role=g("f-role");S.form.status=g("f-status");
  if(!S.quickMode){S.form.dateApplied=g("f-date");S.form.source=g("f-source");S.form.contactPerson=g("f-contact");S.form.contactDetails=g("f-contactd");S.form.followUpDate=g("f-followup");S.form.notes=g("f-notes")}
  saveEntry()
}
function saveEntry(){
  if(!S.form.company.trim()||!S.form.role.trim()){flash("Company & Role required","err");return}
  S.form.lastUpdate=today();
  if(S.editId){S.jobs=S.jobs.map(function(j){return j.id===S.editId?Object.assign({},S.form):j});fbSave(S.form);flash("Updated")}

      else{todayF.forEach(function(j){h+='<div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:6px;background:var(--danger-soft);margin-bottom:4px;cursor:pointer" data-edit="'+j.id+'"><span style="color:var(--danger);font-weight:800;font-size:9px">TODAY</span><span style="font-weight:700">'+esc(j.company)+'</span><span style="color:var(--muted);flex:1">'+esc(j.role)+'</span></div>'});
      upF.forEach(function(j){h+='<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:4px;cursor:pointer" data-edit="'+j.id+'"><span style="color:var(--accent);font-weight:800;font-size:10px;width:40px">'+fmtDate(j.followUpDate)+'</span><span style="font-weight:700">'+esc(j.company)+'</span><span style="color:var(--muted);flex:1">'+esc(j.role)+'</span></div>'})}
      h+='</div></div>'
    }
  } else {
    // Analytics
    var maxW=Math.max(1,Math.max.apply(null,st.weeks.map(function(w){return w.count})));
    h+='<div class="analytics-grid fade-up">';
    // Funnel
    var funnel=[{l:"Applied",c:st.total-st.byS.Rejected,color:"#64748b"},{l:"Shortlisted",c:st.byS.Shortlisted+st.byS["Interview Scheduled"]+st.byS["Interview Completed"]+st.byS["Offer Received"],color:"#3b82f6"},{l:"Interview",c:st.byS["Interview Scheduled"]+st.byS["Interview Completed"]+st.byS["Offer Received"],color:"#8b5cf6"},{l:"Completed",c:st.byS["Interview Completed"]+st.byS["Offer Received"],color:"#6366f1"},{l:"Offer",c:st.byS["Offer Received"],color:"#059669"}];
    h+='<div class="card analytics-card"><div class="analytics-title">Funnel</div>';
    funnel.forEach(function(s){var pct=funnel[0].c>0?Math.max(8,(s.c/funnel[0].c)*100):8;h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:10px;font-weight:700;color:var(--muted);width:60px;text-align:right">'+s.l+'</span><div style="flex:1;height:24px;background:var(--bg2);border-radius:5px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+s.color+';border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px"><span style="font-size:11px;font-weight:800;color:#fff">'+s.c+'</span></div></div></div>'});
    h+='</div>';
    // Trend
    h+='<div class="card analytics-card"><div class="analytics-title">Weekly Trend</div><div style="display:flex;align-items:flex-end;gap:6px;height:110px">';
    st.weeks.forEach(function(w){var ht=Math.max(4,(w.count/maxW)*80);h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><span style="font-size:10px;font-weight:700;color:var(--accent)">'+(w.count||"")+'</span><div style="width:100%;max-width:28px;border-radius:4px;height:'+ht+'px;background:'+(w.count?'linear-gradient(180deg,var(--accent),#4338ca)':'var(--bg2)')+'"></div><span style="font-size:9px;color:var(--dim)">'+w.label+'</span></div>'});
    h+='</div></div>';
    // Status bars
    h+='<div class="card analytics-card"><div class="analytics-title">Status</div>';
    STATUSES.forEach(function(s){var pct=st.total>0?(st.byS[s]/st.total*100):0;h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-size:10px;font-weight:700;color:var(--muted);width:100px;text-align:right">'+s+'</span><div style="flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+SC_COLOR[s]+';border-radius:4px"></div></div><span style="font-size:11px;font-weight:800;color:'+SC_COLOR[s]+';width:22px;text-align:right">'+st.byS[s]+'</span></div>'});
    h+='</div>';
    // Source
    var srcD=Object.keys(st.bySrc).map(function(k){return[k,st.bySrc[k]]});var srcC=["#4f46e5","#3b82f6","#06b6d4","#10b981","#f59e0b","#ef4444","#ec4899"];
    h+='<div class="card analytics-card"><div class="analytics-title">Sources</div>';
    if(srcD.length){var tot=srcD.reduce(function(a,b){return a+b[1]},0);var cum=0;
    h+='<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><svg width="100" height="100" viewBox="-1 -1 2 2" style="transform:rotate(-90deg)">';
    srcD.forEach(function(d,i){var a=(d[1]/tot)*Math.PI*2;var x1=Math.cos(cum),y1=Math.sin(cum);cum+=a;var x2=Math.cos(cum),y2=Math.sin(cum);h+='<path d="M '+x1+' '+y1+' A 1 1 0 '+(a>Math.PI?1:0)+' 1 '+x2+' '+y2+' L 0 0" fill="'+srcC[i%srcC.length]+'"/>'});
    h+='</svg><div>';srcD.forEach(function(d,i){h+='<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px"><span style="width:8px;height:8px;border-radius:2px;background:'+srcC[i%srcC.length]+'"></span><span style="color:var(--text2);font-weight:600">'+esc(d[0])+'</span><span style="color:var(--dim)">'+d[1]+'</span></div>'});h+='</div></div>'}
    else h+='<p style="font-size:12px;color:var(--dim)">No data</p>';
    h+='</div></div>'
  }

  h+='</main>';
  if(S.toast)h+='<div class="toast toast-'+S.toast.type+'">'+esc(S.toast.msg)+'</div>';
  if(S.confirmDel){var isAll=S.confirmDel==="all";var dj=!isAll?S.jobs.filter(function(j){return j.id===S.confirmDel})[0]:null;
  h+='<div class="modal-overlay" onclick="S.confirmDel=null;render()"><div class="modal-box" onclick="event.stopPropagation()"><h3 style="font-size:16px;font-weight:800;margin-bottom:6px">'+(isAll?"Clear All?":"Delete?")+'</h3><p style="font-size:12px;color:var(--muted);margin-bottom:18px">'+(isAll?'Remove all '+S.jobs.length+' applications?':'Delete "'+esc(dj?dj.company:"")+' - '+esc(dj?dj.role:"")+'"?')+'</p><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-ghost" onclick="S.confirmDel=null;render()">Cancel</button><button class="btn btn-danger" onclick="'+(isAll?'clearAll()':'deleteEntry(\''+S.confirmDel+'\')')+'">'+(isAll?"Delete All":"Delete")+'</button></div></div></div>'}

  app.innerHTML=h;bindEvents()
}

// ---- Event Binding ----
function bindEvents(){
  var si=$("#search-input");if(si)si.oninput=function(e){S.search=e.target.value;render()};
  var fs=$("#filter-status");if(fs)fs.onchange=function(e){S.fStatus=e.target.value;render()};
  var fsr=$("#filter-source");if(fsr)fsr.onchange=function(e){S.fSource=e.target.value;render()};
  var ths=$$("th[data-sort]");for(var i=0;i<ths.length;i++){(function(th){th.onclick=function(){var k=th.getAttribute("data-sort");if(S.sortKey===k)S.sortDir=S.sortDir==="asc"?"desc":"asc";else{S.sortKey=k;S.sortDir="desc"}render()}})(ths[i])}
  var qss=$$("select[data-quickstatus]");for(var i2=0;i2<qss.length;i2++){(function(sel){sel.onchange=function(e){quickStatus(sel.getAttribute("data-quickstatus"),e.target.value)}})(qss[i2])}
  var eds=$$("[data-edit]");for(var i3=0;i3<eds.length;i3++){(function(el){el.onclick=function(e){e.stopPropagation();var job=null;for(var x=0;x<S.jobs.length;x++){if(S.jobs[x].id===el.getAttribute("data-edit")){job=S.jobs[x];break}}if(job)openForm(job)}})(eds[i3])}
  var dels=$$("[data-del]");for(var i4=0;i4<dels.length;i4++){(function(el){el.onclick=function(e){e.stopPropagation();S.confirmDel=el.getAttribute("data-del");render()}})(dels[i4])}
  var inls=$$("td[data-inline]");for(var i5=0;i5<inls.length;i5++){(function(td){td.onclick=function(){var p=td.getAttribute("data-inline").split(":");var id=p[0],field=p[1];var job=null;for(var x=0;x<S.jobs.length;x++){if(S.jobs[x].id===id){job=S.jobs[x];break}}if(job&&!(S.inlineEdit&&S.inlineEdit.id===id&&S.inlineEdit.field===field)){S.inlineEdit={id:id,field:field,value:job[field]};render();setTimeout(function(){var inp=td.querySelector("input");if(inp){inp.focus();inp.select()}},20)}}})(inls[i5])}
  var cms=$$("input[data-commit]");for(var i6=0;i6<cms.length;i6++){(function(inp){inp.oninput=function(e){if(S.inlineEdit)S.inlineEdit.value=e.target.value};inp.onblur=function(){commitInline()};inp.onkeydown=function(e){if(e.key==="Enter")commitInline();if(e.key==="Escape"){S.inlineEdit=null;render()}}})(cms[i6])}
  var li=$("#link-input");if(li){li.oninput=function(e){S.linkInput=e.target.value};li.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();handleAutofill()}}}
  var fm={"f-company":"company","f-role":"role","f-status":"status","f-date":"dateApplied","f-source":"source","f-contact":"contactPerson","f-contactd":"contactDetails","f-followup":"followUpDate","f-notes":"notes"};
  Object.keys(fm).forEach(function(id){var el=$("#"+id);if(!el)return;var fn=function(e){S.form[fm[id]]=e.target.value};el.oninput=fn;el.onchange=fn});
  var fc=$("#f-company");if(fc)fc.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();var r=$("#f-role");if(r)r.focus()}};
  var fr=$("#f-role");if(fr)fr.onkeydown=function(e){if(e.key==="Enter"&&S.quickMode){e.preventDefault();readFormAndSave()}}
}

document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();var s=$("#search-input");if(s)s.focus()}
  if((e.metaKey||e.ctrlKey)&&e.key==="n"){e.preventDefault();openForm()}
  if((e.metaKey||e.ctrlKey)&&e.key==="Enter"&&S.showForm){e.preventDefault();readFormAndSave()}
  if(e.key==="Escape"){if(S.confirmDel){S.confirmDel=null;render()}else if(S.showForm)resetForm();else if(S.inlineEdit){S.inlineEdit=null;render()}}
});

// Start
initApp();

</script>
</body>
</html>
